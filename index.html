<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search Puzzle Maker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --highlight: #fef08a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
        }

        .word-count-info {
            font-size: 0.85rem;
            color: #64748b;
            text-align: right;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .secondary-btn {
            background-color: #64748b;
            margin-top: 1rem;
            width: 100%;
        }

        .secondary-btn:hover {
            background-color: #475569;
        }

        .puzzle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        #grid {
            display: grid;
            gap: 2px;
            background-color: var(--border);
            border: 2px solid var(--border);
            border-radius: 6px;
            user-select: none;
            touch-action: none;
        }

        .cell {
            width: 32px;
            height: 32px;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        .cell.selected {
            background-color: var(--highlight);
        }

        .cell.found {
            background-color: #bbf7d0;
        }

        .word-list {
            width: 100%;
        }

        .word-list h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .word-list ul {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
        }

        .word-item {
            padding: 0.4rem 0.8rem;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .word-item.found-word {
            text-decoration: line-through;
            background-color: #bbf7d0;
            color: #166534;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Word Search Maker</h1>
    
    <!-- Input Section -->
    <div id="inputSection" class="input-section">
        <label for="wordInput">Enter up to 10 words (separated by commas or new lines):</label>
        <textarea id="wordInput" placeholder="APPLE, BANANA, CHERRY, GRAPE, LEMON" oninput="limitWords()"></textarea>
        <div class="word-count-info" id="wordCount">Words: 0 / 10</div>
        <button onclick="generatePuzzle()">Generate Puzzle</button>
    </div>

    <!-- Puzzle Display Section -->
    <div id="puzzleArea" class="puzzle-area hidden">
        <div id="grid"></div>
        <div class="word-list">
            <h3>Words to Find:</h3>
            <ul id="wordListDisplay"></ul>
        </div>
        <button class="secondary-btn" onclick="resetToInput()">Create New Puzzle</button>
    </div>
</div>

<script>
    const GRID_SIZE = 10;
    let gridData = [];
    let words = [];
    let isSelecting = false;
    let selectedCells = [];

    // Synthesized Sound Effect using Web Audio API
    function playSuccessSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            
            // Note 1 (E5)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(659.25, now);
            gain1.gain.setValueAtTime(0.15, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.2);

            // Note 2 (A5) - slightly delayed
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(880.00, now + 0.1);
            gain2.gain.setValueAtTime(0.15, now + 0.1);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now + 0.1);
            osc2.stop(now + 0.4);
        } catch (e) {
            console.log("Audio play blocked or unsupported:", e);
        }
    }

    // Helper to extract clean array of words
    function getParsedWords(text) {
        return text
            .toUpperCase()
            .split(/[\n,]+/)
            .map(w => w.trim().replace(/[^A-Z]/g, ''))
            .filter(w => w.length > 0);
    }

    // Restrict input to 10 words maximum
    function limitWords() {
        const textarea = document.getElementById('wordInput');
        let parsed = getParsedWords(textarea.value);
        
        if (parsed.length > 10) {
            // Keep only first 10 words
            parsed = parsed.slice(0, 10);
            textarea.value = parsed.join(', ');
        }
        
        document.getElementById('wordCount').textContent = `Words: ${parsed.length} / 10`;
    }

    function generatePuzzle() {
        const rawInput = document.getElementById('wordInput').value;
        words = getParsedWords(rawInput).slice(0, 10);

        if (words.length === 0) {
            alert("Please enter at least one valid word.");
            return;
        }

        initGrid();
        words.forEach(word => placeWord(word));
        fillEmptyCells();
        renderGrid();
        renderWordList();

        // Hide form and show puzzle
        document.getElementById('inputSection').classList.add('hidden');
        document.getElementById('puzzleArea').classList.remove('hidden');
    }

    function resetToInput() {
        document.getElementById('puzzleArea').classList.add('hidden');
        document.getElementById('inputSection').classList.remove('hidden');
    }

    function initGrid() {
        gridData = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
    }

    function placeWord(word) {
        if (word.length > GRID_SIZE) return;

        const directions = [
            [0, 1],   // Horizontal right
            [1, 0],   // Vertical down
            [1, 1],   // Diagonal down-right
            [-1, 1]   // Diagonal up-right
        ];

        let placed = false;
        let attempts = 0;

        while (!placed && attempts < 100) {
            attempts++;
            const dir = directions[Math.floor(Math.random() * directions.length)];
            const row = Math.floor(Math.random() * GRID_SIZE);
            const col = Math.floor(Math.random() * GRID_SIZE);

            if (canPlace(word, row, col, dir)) {
                for (let i = 0; i < word.length; i++) {
                    gridData[row + i * dir[0]][col + i * dir[1]] = word[i];
                }
                placed = true;
            }
        }
    }

    function canPlace(word, row, col, dir) {
        for (let i = 0; i < word.length; i++) {
            const r = row + i * dir[0];
            const c = col + i * dir[1];

            if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
            if (gridData[r][c] !== '' && gridData[r][c] !== word[i]) return false;
        }
        return true;
    }

    function fillEmptyCells() {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (gridData[r][c] === '') {
                    gridData[r][c] = letters[Math.floor(Math.random() * letters.length)];
                }
            }
        }
    }

    function renderGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 32px)`;

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = gridData[r][c];
                cell.dataset.row = r;
                cell.dataset.col = c;

                cell.addEventListener('mousedown', startSelection);
                cell.addEventListener('mouseenter', continueSelection);
                cell.addEventListener('mouseup', endSelection);

                cell.addEventListener('touchstart', handleTouchStart);
                cell.addEventListener('touchmove', handleTouchMove);
                cell.addEventListener('touchend', endSelection);

                gridEl.appendChild(cell);
            }
        }
    }

    function startSelection(e) {
        isSelecting = true;
        selectedCells = [e.target];
        e.target.classList.add('selected');
    }

    function continueSelection(e) {
        if (!isSelecting) return;
        if (!selectedCells.includes(e.target)) {
            selectedCells.push(e.target);
            e.target.classList.add('selected');
        }
    }

    function handleTouchStart(e) {
        isSelecting = true;
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (target && target.classList.contains('cell')) {
            selectedCells = [target];
            target.classList.add('selected');
        }
    }

    function handleTouchMove(e) {
        if (!isSelecting) return;
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (target && target.classList.contains('cell') && !selectedCells.includes(target)) {
            selectedCells.push(target);
            target.classList.add('selected');
        }
    }

    function endSelection() {
        if (!isSelecting) return;
        isSelecting = false;

        const selectedWord = selectedCells.map(c => c.textContent).join('');
        const reversedWord = selectedWord.split('').reverse().join('');

        if (words.includes(selectedWord)) {
            markAsFound(selectedWord);
        } else if (words.includes(reversedWord)) {
            markAsFound(reversedWord);
        } else {
            selectedCells.forEach(c => c.classList.remove('selected'));
        }
        selectedCells = [];
    }

    function markAsFound(word) {
        // Check if word wasn't already found before playing sound
        const wordEl = document.getElementById(`word-${word}`);
        if (wordEl && !wordEl.classList.contains('found-word')) {
            playSuccessSound();
        }

        selectedCells.forEach(c => {
            c.classList.remove('selected');
            c.classList.add('found');
        });
        markWordAsFound(word);
    }

    function renderWordList() {
        const listEl = document.getElementById('wordListDisplay');
        listEl.innerHTML = '';
        words.forEach(word => {
            const li = document.createElement('li');
            li.className = 'word-item';
            li.id = `word-${word}`;
            li.textContent = word;
            listEl.appendChild(li);
        });
    }

    function markWordAsFound(word) {
        const wordEl = document.getElementById(`word-${word}`);
        if (wordEl) {
            wordEl.classList.add('found-word');
        }
    }
</script>

</body>
</html>
