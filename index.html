<!-- OCR Upload Section -->
<div class="ocr-section">
    <label>📷 Scan Words from Photo / Image:</label><br>
    
    <!-- Gallery Picker -->
    <input type="file" id="ocrInputGallery" accept="image/*,android/force-camera-workaround" class="hidden" onchange="processImageOCR(this)">
    
    <!-- Direct Camera Capture -->
    <input type="file" id="ocrInputCamera" accept="image/*" capture="environment" class="hidden" onchange="processImageOCR(this)">
    
    <div style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; flex-wrap: wrap;">
        <button type="button" class="ocr-upload-btn" onclick="document.getElementById('ocrInputCamera').click()">📷 Take Photo</button>
        <button type="button" class="ocr-upload-btn" style="background-color: #475569;" onclick="document.getElementById('ocrInputGallery').click()">📁 Upload Image</button>
    </div>

    <div id="ocrStatus" class="ocr-status hidden">Processing image...</div>
    
    <div id="extractedContainer" class="hidden" style="margin-top: 0.8rem; text-align: left;">
        <label style="font-size: 0.8rem; color: #475569;">Tap words to add to puzzle:</label>
        <div id="extractedWordsList" class="extracted-words-wrapper"></div>
    </div>
</div>
