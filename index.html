<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search Puzzle Maker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --highlight: #fef08a;
            --start-cell: #93c5fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
        }

        .word-count-info {
            font-size: 0.85rem;
            color: #64748b;
            text-align: right;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .submit-btn {
            background-color: #16a34a;
            flex: 1;
        }

        .submit-btn:hover {
            background-color: #15803d;
        }

        .cancel-btn {
            background-color: #dc2626;
            flex: 1;
        }

        .cancel-btn:hover {
            background-color: #b91c1c;
        }

        .secondary-btn {
            background-color: #64748b;
            margin-top: 1rem;
            width: 100%;
        }

        .secondary-btn:hover {
            background-color: #475569;
        }

        .puzzle-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        #grid {
            display: grid;
            gap: 2px;
            background-color: var(--border);
            border: 2px solid var(--border);
            border-radius: 6px;
            user-select: none;
        }

        .cell {
            width: 32px;
            height: 32px;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .cell.start-cell {
            background-color: var(--start-cell) !important;
        }

        .cell.selected {
            background-color: var(--highlight);
        }

        .cell.found {
            background-color: #bbf7d0 !important;
        }

        .word-list {
            width: 100%;
        }

        .word-list h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .word-list ul {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
        }

        .word-item {
            padding: 0.4rem 0.8rem;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .word-item.found-word {
            text-decoration: line-through;
            background-color: #bbf7d0;
            color: #166534;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Word Search Maker</h1>
    
    <!-- Input Section -->
    <div id="inputSection" class="input-section">
        <label for="wordInput">Enter up to 10 words (separated by commas or new lines):</label>
        <textarea id="wordInput" placeholder="APPLE, BANANA, CHERRY, GRAPE, LEMON" oninput="limitWords()"></textarea>
        <div class="word-count-info" id="wordCount">Words: 0 / 10</div>
        <button onclick="generatePuzzle()">Generate Puzzle</button>
    </div>

    <!-- Puzzle Display Section -->
    <div id="puzzleArea" class="puzzle-area hidden">
        <div id="grid"></div>

        <div class="action-btns">
            <button class="submit-btn" onclick="submitSelection()">Submit Word</button>
            <button class="cancel-btn" onclick="clearSelection()">Clear Selection</button>
        </div>

        <div class="word-list">
            <h3>Words to Find:</h3>
            <ul id="wordListDisplay"></ul>
        </div>
        <button class="secondary-btn" onclick="resetToInput()">Create New Puzzle</button>
    </div>
</div>

<script>
    const GRID_SIZE = 10;
    let gridData = [];
    let words = [];
    let selectedPath = [];
    let audioCtx = null;

    // Mobile-friendly Web Audio API Sound Chime
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSuccessSound() {
        try {
            initAudio();
            const now = audioCtx.currentTime;
            
            // Note 1 (E5)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(659.25, now);
            gain1.gain.setValueAtTime(0.2, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.25);

            // Note 2 (A5)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(880.00, now + 0.12);
            gain2.gain.setValueAtTime(0.2, now + 0.12);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now + 0.12);
            osc2.stop(now + 0.45);
        } catch (e) {
            console.log("Audio play error:", e);
        }
    }

    function getParsedWords(text) {
        return text
            .toUpperCase()
            .split(/[\n,]+/)
            .map(w => w.trim().replace(/[^A-Z]/g, ''))
            .filter(w => w.length > 0);
    }

    function limitWords() {
        const textarea = document.getElementById('wordInput');
        let parsed = getParsedWords(textarea.value);
        
        if (parsed.length > 10) {
            parsed = parsed.slice(0, 10);
            textarea.value = parsed.join(', ');
        }
        
        document.getElementById('wordCount').textContent = `Words: ${parsed.length} / 10`;
    }

    function generatePuzzle() {
        initAudio(); // Initialize audio on direct user button tap
        const rawInput = document.getElementById('wordInput').value;
        words = getParsedWords(rawInput).slice(0, 10);

        if (words.length === 0) {
            alert("Please enter at least one valid word.");
            return;
        }

        // Sort longest words first to guarantee placement on grid
        words.sort((a, b) => b.length - a.length);

        let success = false;
        let retries = 0;

        // Ensure full layout retry if any word fails to fit
        while (!success && retries < 50) {
            retries++;
            initGrid();
            let placedAll = true;

            for (let word of words) {
                if (!placeWord(word)) {
                    placedAll = false;
                    break;
                }
            }

            if (placedAll) {
                success = true;
            }
        }

        fillEmptyCells();
        renderGrid();
        renderWordList();

        document.getElementById('inputSection').classList.add('hidden');
        document.getElementById('puzzleArea').classList.remove('hidden');
    }

    function resetToInput() {
        clearSelection();
        document.getElementById('puzzleArea').classList.add('hidden');
        document.getElementById('inputSection').classList.remove('hidden');
    }

    function initGrid() {
        gridData = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
    }

    function placeWord(word) {
        if (word.length > GRID_SIZE) return false;

        // Expanded 8 directional vectors for maximum fit probability
        const directions = [
            [0, 1],   // Right
            [1, 0],   // Down
            [1, 1],   // Down-Right
            [-1, 1],  // Up-Right
            [0, -1],  // Left
            [-1, 0],  // Up
            [-1, -1], // Up-Left
            [1, -1]   // Down-Left
        ];

        let attempts = 0;
        while (attempts < 200) {
            attempts++;
            const dir = directions[Math.floor(Math.random() * directions.length)];
            const row = Math.floor(Math.random() * GRID_SIZE);
            const col = Math.floor(Math.random() * GRID_SIZE);

            if (canPlace(word, row, col, dir)) {
                for (let i = 0; i < word.length; i++) {
                    gridData[row + i * dir[0]][col + i * dir[1]] = word[i];
                }
                return true;
            }
        }
        return false;
    }

    function canPlace(word, row, col, dir) {
        for (let i = 0; i < word.length; i++) {
            const r = row + i * dir[0];
            const c = col + i * dir[1];

            if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return false;
            if (gridData[r][c] !== '' && gridData[r][c] !== word[i]) return false;
        }
        return true;
    }

    function fillEmptyCells() {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (gridData[r][c] === '') {
                    gridData[r][c] = letters[Math.floor(Math.random() * letters.length)];
                }
            }
        }
    }

    function renderGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 32px)`;

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = gridData[r][c];
                cell.dataset.row = r;
                cell.dataset.col = c;

                cell.addEventListener('click', handleCellClick);
                gridEl.appendChild(cell);
            }
        }
    }

    function handleCellClick(e) {
        initAudio();
        const target = e.target;
        const row = parseInt(target.dataset.row);
        const col = parseInt(target.dataset.col);

        // Cancel selection if first cell tapped again
        if (selectedPath.length > 0 && selectedPath[0].row === row && selectedPath[0].col === col) {
            clearSelection();
            return;
        }

        // Submit selection if last cell tapped again
        if (selectedPath.length > 1 && selectedPath[selectedPath.length - 1].row === row && selectedPath[selectedPath.length - 1].col === col) {
            submitSelection();
            return;
        }

        if (selectedPath.length === 0) {
            selectedPath.push({ row, col, el: target });
            target.classList.add('start-cell');
        } else {
            const lastCell = selectedPath[selectedPath.length - 1];
            const dRow = Math.abs(row - lastCell.row);
            const dCol = Math.abs(col - lastCell.col);

            // Must be adjacent (distance <= 1)
            if (dRow <= 1 && dCol <= 1 && !(dRow === 0 && dCol === 0)) {
                const exists = selectedPath.some(p => p.row === row && p.col === col);
                if (!exists) {
                    selectedPath.push({ row, col, el: target });
                    target.classList.add('selected');
                }
            }
        }
    }

    function submitSelection() {
        initAudio();
        if (selectedPath.length === 0) return;

        const selectedWord = selectedPath.map(p => gridData[p.row][p.col]).join('');
        const reversedWord = selectedWord.split('').reverse().join('');

        let matchedWord = null;
        if (words.includes(selectedWord)) matchedWord = selectedWord;
        else if (words.includes(reversedWord)) matchedWord = reversedWord;

        if (matchedWord) {
            playSuccessSound();

            selectedPath.forEach(p => {
                p.el.classList.remove('start-cell', 'selected');
                p.el.classList.add('found');
            });
            markWordAsFound(matchedWord);
            selectedPath = [];
        } else {
            selectedPath.forEach(p => {
                p.el.style.backgroundColor = '#fca5a5';
            });
            setTimeout(() => {
                selectedPath.forEach(p => p.el.style.backgroundColor = '');
                clearSelection();
            }, 300);
        }
    }

    function clearSelection() {
        selectedPath.forEach(p => {
            p.el.classList.remove('start-cell', 'selected');
            p.el.style.backgroundColor = '';
        });
        selectedPath = [];
    }

    function renderWordList() {
        const listEl = document.getElementById('wordListDisplay');
        listEl.innerHTML = '';
        words.forEach(word => {
            const li = document.createElement('li');
            li.className = 'word-item';
            li.id = `word-${word}`;
            li.textContent = word;
            listEl.appendChild(li);
        });
    }

    function markWordAsFound(word) {
        const wordEl = document.getElementById(`word-${word}`);
        if (wordEl) {
            wordEl.classList.add('found-word');
        }
    }
</script>

</body>
</html>
